<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Omakidx fire-breathing ASCII dragon</title>
  <desc id="desc">A colorful original ASCII cyber-dragon breathes fire beside a workflow card: design interfaces and systems, build full-stack products, automate agent workflows, and ship useful software.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#11152d"/>
      <stop offset="1" stop-color="#220d32"/>
    </linearGradient>
    <linearGradient id="dragon" x1="24" y1="0" x2="720" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.35" stop-color="#60a5fa"/>
      <stop offset="0.68" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="fire" x1="330" y1="0" x2="735" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.45" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94a3b8" stroke-opacity="0.07"/>
    </pattern>
    <filter id="fireGlow" x="-30%" y="-80%" width="170%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="430" rx="24" fill="url(#background)"/>
  <rect x="1" y="1" width="1198" height="428" rx="23" fill="none" stroke="#334155"/>
  <rect width="1200" height="430" rx="24" fill="url(#grid)"/>

  <circle cx="28" cy="28" r="5" fill="#fb7185"/>
  <circle cx="46" cy="28" r="5" fill="#fbbf24"/>
  <circle cx="64" cy="28" r="5" fill="#34d399"/>
  <text x="82" y="33" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13" letter-spacing="1.6">OMAKIDX // BUILD MODE</text>

  <g filter="url(#fireGlow)">
    <path fill="#ef4444" opacity="0.82" d="M338 183C420 130 480 157 535 112c-13 37 45 38 90 16-17 31 53 33 99 57-48 25-112 20-154 45 11-27-55-18-100 0 19-28-50-21-132-36Z"/>
    <path fill="#fb923c" opacity="0.94" d="M344 185c76-29 128-6 204-35-13 25 56 18 131 37-71 17-134 9-195 24 13-21-57-9-140-18Z"/>
  </g>

