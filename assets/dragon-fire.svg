    <text x="798" y="231" fill="#f472b6" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14" font-weight="700">AUTOMATE</text>
    <text x="900" y="231" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13">agent workflows</text>
    <text x="798" y="275" fill="#34d399" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14" font-weight="700">SHIP</text>
    <text x="900" y="275" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13">useful software</text>
    <rect x="798" y="310" width="334" height="42" rx="9" fill="#020617" stroke="#334155"/>
    <text x="816" y="336" fill="#fbbf24" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13">IDEA  -&gt;  CODE  -&gt;  IMPACT _</text>
