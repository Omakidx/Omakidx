    <tspan x="26" y="64">                  __/\__                         __/\__</tspan>
    <tspan x="26" y="82">             _.-'/######\__                 __/######\'-._</tspan>
    <tspan x="26" y="100">         _.-'   /##########\___.-------.___/##########\   '-._</tspan>
    <tspan x="26" y="118">       .'      /############/    _____    \############\      '.</tspan>
    <tspan x="26" y="136">      /______./######/\####/    /_   _\    \####/\######\.______\</tspan>
    <tspan x="26" y="154">      \      /######/  \##/    | o   o |    \##/  \######\      /</tspan>
    <tspan x="26" y="172">       '.___/###/\##\   \/     |   ^   |     \/   /##/\###\___.'</tspan>
    <tspan x="26" y="190">          /___/  \__\    \     \  ===  /</tspan>
    <tspan x="26" y="208">       ___\   \___________\     '.___.'     /___________/   /___</tspan>
    <tspan x="26" y="226">      /    '._      _.-'   \_____/ | \_____/   '-._      _.'    \</tspan>
    <tspan x="26" y="244">     /_.--'    '--._/      /    | | |    \      \_.--'    '--._\</tspan>
    <tspan x="26" y="262">     \             / \____/     | | |     \____/ \             /</tspan>
    <tspan x="26" y="280">      '._       .-'    /        | | |        \    '-.       _.'</tspan>
    <tspan x="26" y="298">         '----'       /____   __|_|_|__   ____\       '----'</tspan>
    <tspan x="26" y="316">                     /_/\_\ /_/     \_\ /_/\_\</tspan>
    <tspan x="26" y="334">                    /_____/             \_____\</tspan>
  </text>

  <path fill="#fde047" filter="url(#fireGlow)" d="M348 187c73-10 151-3 278 1-96 9-191 8-278 4Z"/>
  <text x="350" y="181" fill="url(#fire)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="17" font-weight="700">~~~===&gt;  *  +  )))  &gt;&gt;&gt;&gt;&gt;</text>
  <text x="302" y="154" fill="#fde68a" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="12.8">o   o</text>

  <rect x="30" y="365" width="690" height="38" rx="10" fill="#020617" fill-opacity="0.72" stroke="#1e3a5f"/>
  <text x="48" y="389" fill="#6ee7b7" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13">&gt; automating the boring so ideas move faster_</text>

  <g>
    <rect x="770" y="52" width="390" height="326" rx="18" fill="#0f172a" fill-opacity="0.88" stroke="#475569"/>
    <text x="798" y="88" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14" font-weight="700">$ OMAKIDX --builder-mode</text>
    <line x1="798" y1="106" x2="1132" y2="106" stroke="#334155"/>
    <text x="798" y="143" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14" font-weight="700">DESIGN</text>
    <text x="900" y="143" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13">interfaces + systems</text>
    <text x="798" y="187" fill="#a78bfa" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14" font-weight="700">BUILD</text>
